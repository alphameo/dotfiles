"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100

format = """
[¯éÂ](block_bg)\
$os\
$username\
[¯é┤](block_bg)\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_state\
$python\
$line_break\
$character"""

palette = 'colors'

[os]
disabled = false
style = "bg:block_bg fg:block_fg"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
EndeavourOS = "¾░úç"

[username]
show_always = true
style_user = "bg:block_bg fg:block_fg"
style_root = "bg:block_bg fg:block_fg"
format = '[ $user]($style)'

[directory]
style = "fg:blue"
format = "[ ¯ù┐ $path]($style)[$read_only]($read_only_style)"
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "../"
read_only = " ¾░î¥ "

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "¾░çÜ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Development" = "¾░▓ï "

[git_branch]
disabled = false
symbol = "´Éÿ"
style = "fg:yellow"
format = '[ $symbol $branch(:$remote_branch)]($style)'

[git_commit]
disabled = false
tag_disabled = false
only_detached = true
tag_symbol = "´ÉÆ "
style = "fg:bright-blue"
format = '[:$hash (\($tag\))]($style)'

[git_status]
disabled = false
style = "fg:bright-yellow"
format = '[( $ahead_behind)( ´üä( $conflicted)( $untracked)( $modified)( $deleted)( | $staged)( $renamed))]($style)[( $stashed)](fg:purple)'
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
conflicted = "=${count}"
untracked = "?${count}"
stashed = "¯¡ï ${count}"
modified = "~${count}"
staged = "´üå ${count}"
renamed = '┬╗${count}'
deleted = "-${count}"
typechanged = ""

[git_state]
disabled = false
format = ' \([$state ($progress_current/$progress_total)]($style)\) '
style = "fg:yellow"

[nodejs]
symbol = "¾░ÄÖ "
style = "bg:green"
format = '[ ¯éÂ](fg:node_green)[$symbol($version)( $virtualenv)](bg:node_green fg:node_gray)[¯é┤](fg:node_green)'

[python]
symbol = "¯ÿå"
style = "bg:green"
format = '[ ¯éÂ](fg:py_blue)[$symbol( $version)( $virtualenv)](bg:py_blue fg:py_yellow)[¯é┤](fg:py_blue)'

[docker_context]
symbol = "´îê"
style = "bg:sapphire"
format = '[ ¯éÂ](fg:doc_blue)[$symbol( $version)( $virtualenv)](bg:doc_blue fg:doc_black)[¯é┤](fg:doc_blue)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ ÔØ»](bold fg:green)'
error_symbol = '[ ÔØ»](bold fg:red)'
vimcmd_symbol = '[ ÔØ«](bold fg:purple)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:bright-cyan"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.colors]
block_bg = "#29315a"
block_fg = "#3ec669"
py_yellow = "#fee464"
py_blue = "#3670a1"
node_gray = "#303030"
node_green = "#69be44"
doc_blue = "#0B59E7"
doc_black = "#000000"
